server {
    server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;

    root /var/www/salon;
    index index.html;

    charset utf-8;
    types_hash_bucket_size 128;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location /api/doc-stats/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
    }

    location /api/order {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }

    location /api/contribute {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }

    location /api/admin/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        client_max_body_size 50m;
    }

    location /catalog.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Expo mobile app at /app/
    location /app/ {
        alias /var/www/salon/mobile/;
        try_files $uri $uri/ /app/index.html;
    }

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /files/ {
        alias /var/www/salon/files/;
        types {
            application/pdf pdf;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
            application/vnd.openxmlformats-officedocument.presentationml.presentation pptx;
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
            application/msword doc;
            application/vnd.oasis.opendocument.text odt;
            audio/mpeg mp3;
            image/jpeg jpg;
        }
        add_header Content-Disposition "attachment";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/bibliosaloon.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/bibliosaloon.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = bibliosaloon.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
    return 404; # managed by Certbot
}
