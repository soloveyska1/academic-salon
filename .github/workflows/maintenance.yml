name: Maintenance

on:
  workflow_dispatch:
    inputs:
      cleanup_may9_test_slot:
        description: 'Delete the only May9 test voice row and its private files'
        required: true
        type: boolean
        default: false

jobs:
  cleanup-may9-test-slot:
    if: ${{ inputs.cleanup_may9_test_slot == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install SSH tooling
        run: sudo apt-get install -y -qq sshpass >/dev/null 2>&1

      - name: Delete only May9 test slot
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SSHPASS:-}" ]; then
            echo "::error::SERVER_PASSWORD secret is not configured"
            exit 1
          fi

          OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          sshpass -e ssh $OPTS root@94.241.143.29 'bash -s' <<'REMOTE'
          set -euo pipefail
          DB="/var/lib/bibliosaloon/doc_stats.sqlite3"
          MAY9_DIR="/var/lib/bibliosaloon/may9_voices"

          count="$(sqlite3 "$DB" "SELECT COUNT(*) FROM may9_voices;")"
          if [ "$count" != "1" ]; then
            echo "::error::Refusing cleanup: expected exactly 1 May9 row, got $count"
            exit 1
          fi

          voice_id="$(sqlite3 "$DB" "SELECT id FROM may9_voices ORDER BY id DESC LIMIT 1;")"
          if [ -z "$voice_id" ]; then
            echo "::error::May9 voice id not found"
            exit 1
          fi

          backup_dir="/var/lib/bibliosaloon/backups"
          mkdir -p "$backup_dir"
          backup="$backup_dir/doc_stats.sqlite3.before-may9-clean-${voice_id}-$(date +%s)"
          sqlite3 "$DB" ".backup '$backup'"

          sqlite3 "$DB" "BEGIN;
            DELETE FROM outbox_jobs
            WHERE task_type IN ('may9_voice_admin_notice','may9_voice_generate')
              AND payload_json LIKE '%\"voice_id\":${voice_id}%';
            DELETE FROM may9_voices WHERE id = ${voice_id};
            COMMIT;"

          rm -rf "$MAY9_DIR/voice_${voice_id}"
          remaining="$(sqlite3 "$DB" "SELECT COUNT(*) FROM may9_voices;")"
          echo "Deleted May9 voice #${voice_id}; remaining=${remaining}; backup=${backup}"
          REMOTE

      - name: Verify public slots
        run: |
          response="$(curl -fsS https://bibliosaloon.ru/api/may9/slots)"
          echo "$response"
          echo "$response" | grep -q '"taken": 0'
