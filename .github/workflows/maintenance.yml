name: Maintenance

on:
  workflow_dispatch:
    inputs:
      cleanup_may9_test_slot:
        description: 'Delete the only May9 test voice row and its private files'
        required: true
        type: boolean
        default: false

jobs:
  cleanup-may9-test-slot:
    if: ${{ inputs.cleanup_may9_test_slot == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install SSH tooling
        run: sudo apt-get install -y -qq sshpass >/dev/null 2>&1

      - name: Delete only May9 test slot
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SSHPASS:-}" ]; then
            echo "::error::SERVER_PASSWORD secret is not configured"
            exit 1
          fi

          OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          sshpass -e ssh $OPTS root@94.241.143.29 'bash -s' <<'REMOTE'
          set -euo pipefail
          DB="/var/lib/bibliosaloon/doc_stats.sqlite3"
          MAY9_DIR="/var/lib/bibliosaloon/may9_voices"

          python3 - "$DB" "$MAY9_DIR" <<'PY'
          import json
          import os
          import shutil
          import sqlite3
          import sys
          import time

          db_path, may9_dir = sys.argv[1], sys.argv[2]
          backup_dir = "/var/lib/bibliosaloon/backups"

          con = sqlite3.connect(db_path)
          con.row_factory = sqlite3.Row
          count = int(con.execute("SELECT COUNT(*) AS c FROM may9_voices").fetchone()["c"] or 0)
          if count != 1:
              print(f"::error::Refusing cleanup: expected exactly 1 May9 row, got {count}")
              sys.exit(1)

          voice_id = int(con.execute("SELECT id FROM may9_voices ORDER BY id DESC LIMIT 1").fetchone()["id"])
          os.makedirs(backup_dir, exist_ok=True)
          backup = os.path.join(backup_dir, f"doc_stats.sqlite3.before-may9-clean-{voice_id}-{int(time.time())}")
          with sqlite3.connect(backup) as backup_con:
              con.backup(backup_con)

          job_ids = []
          for row in con.execute(
              "SELECT id, payload_json FROM outbox_jobs WHERE task_type IN (?, ?)",
              ("may9_voice_admin_notice", "may9_voice_generate"),
          ):
              try:
                  payload = json.loads(row["payload_json"] or "{}")
              except json.JSONDecodeError:
                  payload = {}
              if int(payload.get("voice_id") or 0) == voice_id:
                  job_ids.append(int(row["id"]))

          con.execute("BEGIN")
          if job_ids:
              con.executemany("DELETE FROM outbox_jobs WHERE id = ?", [(job_id,) for job_id in job_ids])
          con.execute("DELETE FROM may9_voices WHERE id = ?", (voice_id,))
          con.commit()
          shutil.rmtree(os.path.join(may9_dir, f"voice_{voice_id}"), ignore_errors=True)

          remaining = int(con.execute("SELECT COUNT(*) AS c FROM may9_voices").fetchone()["c"] or 0)
          con.close()
          print(f"Deleted May9 voice #{voice_id}; remaining={remaining}; backup={backup}")
          PY
          REMOTE

      - name: Verify public slots
        run: |
          response="$(curl -fsS https://bibliosaloon.ru/api/may9/slots)"
          echo "$response"
          echo "$response" | grep -q '"taken": 0'
