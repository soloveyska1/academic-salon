name: Deploy Mobile App

on:
  push:
    branches: [main]
    paths:
      - 'src/mobile/**'
      - 'src/styles/mobile/**'
      - 'src/modules/**'
      - 'src/data/**'
      - 'src/styles/**'
      - 'public/**'
      - 'mobile.html'
      - 'src/mobile-entry.js'
      - 'vite.mobile.config.js'
      - '.github/workflows/deploy-mobile.yml'
  workflow_dispatch:

jobs:
  deploy-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install & build legacy mobile app
        run: npm ci && npx vite build --config vite.mobile.config.js && cp mobile-dist/mobile.html mobile-dist/index.html

      - name: Deploy mobile to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 94.241.143.29
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "mobile-dist/*"
          target: "/var/www/salon/mobile"
          strip_components: 1
          overwrite: true
