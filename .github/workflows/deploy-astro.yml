name: Deploy Astro Site

on:
  push:
    branches: [main]
    paths:
      - 'astro-site/**'
      - 'deploy/**'
      - '.github/workflows/deploy-astro.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install and build
        working-directory: astro-site
        run: |
          npm ci
          npm run build
          echo "Built $(find dist -name '*.html' | wc -l) pages"

      - name: Deploy
        run: |
          sudo apt-get install -y -qq sshpass rsync > /dev/null 2>&1
          export SSHPASS="${{ secrets.SERVER_PASSWORD }}"
          SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 root@94.241.143.29"
          SCP="sshpass -e scp -o StrictHostKeyChecking=no"

          # Clean broken symlinks
          $SSH "find /var/www/salon -maxdepth 3 -type l ! -exec test -e {} \; -delete 2>/dev/null" || true

          # Rsync site files
          sshpass -e rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30" --exclude='files/' --exclude='mobile/' --exclude='catalog.json' --exclude='app/' astro-site/dist/ root@94.241.143.29:/var/www/salon/

          # Upload nginx config and reload
          $SCP deploy/nginx.conf root@94.241.143.29:/etc/nginx/sites-available/salon
          $SSH "chown -R www-data:www-data /var/www/salon && chmod -R 755 /var/www/salon && nginx -t && systemctl reload nginx"

          echo "Deployed OK"

      - name: Verify
        run: |
          sleep 5
          for p in "/" "/catalog/" "/about/" "/order/"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://bibliosaloon.ru$p")
            echo "$p -> $code"
          done
