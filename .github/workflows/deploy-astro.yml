name: Deploy Astro Site

on:
  push:
    branches: [main]
    paths:
      - 'astro-site/**'
      - 'deploy/**'
      - '.github/workflows/deploy-astro.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Build
        run: cd astro-site && npm ci && npm run build

      - name: Deploy to server (atomic swap)
        run: |
          sudo apt-get install -y -qq sshpass rsync >/dev/null 2>&1
          export SSHPASS='${{ secrets.SERVER_PASSWORD }}'
          OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          # Stage to temp dir, then atomic swap — no mixed old/new content
          sshpass -e ssh $OPTS root@94.241.143.29 "mkdir -p /var/www/salon-next && rm -rf /var/www/salon-next/*"
          sshpass -e rsync -az -e "ssh $OPTS" astro-site/dist/ root@94.241.143.29:/var/www/salon-next/
          sshpass -e scp $OPTS deploy/nginx.conf root@94.241.143.29:/etc/nginx/sites-available/salon
          # Copy persistent dirs (files, mobile) then swap
          sshpass -e ssh $OPTS root@94.241.143.29 "
            cp -al /var/www/salon/files /var/www/salon-next/files 2>/dev/null || true
            cp -al /var/www/salon/catalog.json /var/www/salon-next/catalog.json 2>/dev/null || true
            mv /var/www/salon /var/www/salon-old && mv /var/www/salon-next /var/www/salon
            rm -rf /var/www/salon-old
            chown -R www-data:www-data /var/www/salon && chmod -R 755 /var/www/salon
            nginx -t && systemctl reload nginx
          "
          echo "Done"

      - name: Verify
        run: |
          sleep 5
          curl -so/dev/null -w "/ -> %{http_code}\n" https://bibliosaloon.ru/
          curl -so/dev/null -w "/catalog/ -> %{http_code}\n" https://bibliosaloon.ru/catalog/
