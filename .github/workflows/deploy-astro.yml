name: Deploy Astro Site

on:
  push:
    branches: [main]
    paths:
      - 'astro-site/**'
      - 'deploy/**'
      - '.github/workflows/deploy-astro.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Build
        run: cd astro-site && npm ci && npm run build

      - name: Deploy to server
        run: |
          sudo apt-get install -y -qq sshpass rsync >/dev/null 2>&1
          export SSHPASS='${{ secrets.SERVER_PASSWORD }}'
          OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          sshpass -e ssh $OPTS root@94.241.143.29 "find /var/www/salon -maxdepth 3 -type l ! -exec test -e {} \; -delete" || true
          sshpass -e rsync -az --delete -e "ssh $OPTS" --exclude=/files/ --exclude=/mobile/ --exclude=/catalog.json --exclude=/app/ astro-site/dist/ root@94.241.143.29:/var/www/salon/
          sshpass -e scp $OPTS deploy/nginx.conf root@94.241.143.29:/etc/nginx/sites-available/salon
          sshpass -e ssh $OPTS root@94.241.143.29 "chown -R www-data:www-data /var/www/salon && chmod -R 755 /var/www/salon && nginx -t && systemctl reload nginx"
          echo "Done"

      - name: Verify
        run: |
          sleep 5
          curl -so/dev/null -w "/ -> %{http_code}\n" https://bibliosaloon.ru/
          curl -so/dev/null -w "/catalog/ -> %{http_code}\n" https://bibliosaloon.ru/catalog/
