name: Deploy Astro Site

on:
  push:
    branches: [main]
    paths:
      - 'astro-site/**'
      - '.github/workflows/deploy-astro.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install & build
        working-directory: astro-site
        run: |
          npm ci
          npm run build
          echo "Built $(find dist -name '*.html' | wc -l) pages"

      - name: Deploy to server
        env:
          SSH_PASS: ${{ secrets.SSH_PASS || secrets.SERVER_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST || '94.241.143.29' }}
        run: |
          sudo apt-get install -y -qq sshpass rsync > /dev/null 2>&1

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=15"

          # Remove broken symlinks (Codex creates these for mobile)
          sshpass -p "$SSH_PASS" ssh $SSH_OPTS root@$SSH_HOST \
            "find /var/www/salon -maxdepth 3 -type l ! -exec test -e {} \; -delete 2>/dev/null; echo 'Cleaned symlinks'"

          # Deploy with rsync — excludes mobile/files/app to not break Codex
          sshpass -p "$SSH_PASS" rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            --exclude='files/' \
            --exclude='mobile/' \
            --exclude='catalog.json' \
            --exclude='sw.js' \
            --exclude='app/' \
            astro-site/dist/ root@$SSH_HOST:/var/www/salon/

          # Fix permissions
          sshpass -p "$SSH_PASS" ssh $SSH_OPTS root@$SSH_HOST \
            "chown -R www-data:www-data /var/www/salon/ && chmod -R 755 /var/www/salon/"

          # Write correct nginx config (prevents old workflow from breaking it)
          sshpass -p "$SSH_PASS" ssh $SSH_OPTS root@$SSH_HOST 'cat > /etc/nginx/sites-available/salon << '"'"'NGINX'"'"'
          server {
              server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
              root /var/www/salon;
              index index.html;
              charset utf-8;
              gzip on;
              gzip_vary on;
              gzip_min_length 1024;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
              location /api/doc-stats/ { proxy_pass http://127.0.0.1:8765; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 15s; }
              location /api/order { proxy_pass http://127.0.0.1:8765; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; client_max_body_size 1k; }
              location /api/admin/ { proxy_pass http://127.0.0.1:8765; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; client_max_body_size 50m; }
              location /catalog.json { add_header Cache-Control "no-cache"; try_files $uri =404; }
              location /sw.js { add_header Cache-Control "no-cache, must-revalidate"; }
              location /_assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
              location /app/ { alias /var/www/salon/mobile/; try_files $uri $uri/ /app/index.html; }
              location / { add_header Cache-Control "no-cache"; try_files $uri $uri/index.html $uri/ /index.html; }
              location /files/ { alias /var/www/salon/files/; add_header Content-Disposition "attachment"; }
              listen 443 ssl;
              ssl_certificate /etc/letsencrypt/live/bibliosaloon.ru/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/bibliosaloon.ru/privkey.pem;
              include /etc/letsencrypt/options-ssl-nginx.conf;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
          }
          server {
              if ($host = bibliosaloon.ru) { return 301 https://$host$request_uri; }
              listen 80;
              server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
              return 404;
          }
          NGINX'
          sshpass -p "$SSH_PASS" ssh $SSH_OPTS root@$SSH_HOST "nginx -t && systemctl reload nginx"

          echo "✓ Deployed successfully"

      - name: Verify deployment
        run: |
          sleep 3
          OK=true
          for path in "/" "/catalog/" "/about/" "/order/"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://bibliosaloon.ru$path")
            echo "$path → $code"
            if [ "$code" != "200" ]; then
              echo "::warning::$path returned $code"
              OK=false
            fi
          done
          if [ "$OK" = false ]; then
            echo "::warning::Some pages returned non-200 status"
          fi
