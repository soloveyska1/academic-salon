name: Deploy Astro Site

on:
  push:
    branches: [main]
    paths:
      - 'astro-site/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install & build
        working-directory: astro-site
        run: |
          npm ci
          npm run build

      - name: Deploy to server
        env:
          SSH_PASS: ${{ secrets.SSH_PASS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          sudo apt-get install -y sshpass

          # Backup current site
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no root@$SSH_HOST \
            "cp /var/www/salon/index.html /var/www/salon/index.html.bak-\$(date +%Y%m%d-%H%M%S) 2>/dev/null || true"

          # Upload built site
          sshpass -p "$SSH_PASS" scp -o StrictHostKeyChecking=no -r astro-site/dist/* \
            root@$SSH_HOST:/var/www/salon/

          # Ensure nginx supports multi-page routing
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no root@$SSH_HOST \
            "grep -q 'uri/index.html' /etc/nginx/sites-available/salon || \
             sed -i 's|try_files \$uri \$uri/ /index.html;|try_files \$uri \$uri/ \$uri/index.html /index.html;|' /etc/nginx/sites-available/salon && \
             nginx -t && systemctl reload nginx"

          echo "Deployed successfully"

      - name: Verify
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          sleep 3
          for path in "/" "/catalog/" "/about/" "/order/"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://bibliosaloon.ru$path")
            echo "$path → $code"
            if [ "$code" != "200" ]; then echo "WARNING: $path returned $code"; fi
          done
