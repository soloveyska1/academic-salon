name: Deploy Astro Site

on:
  push:
    branches: [main]
    paths:
      - 'astro-site/**'
      - 'deploy/**'
      - '.github/workflows/deploy-astro.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install
        run: cd astro-site && npm ci

      - name: Type check
        run: cd astro-site && npx astro check
        continue-on-error: true

      - name: Build
        run: cd astro-site && npm run build

      - name: Pin SSH host key
        env:
          SERVER_SSH_HOST_KEY: ${{ secrets.SERVER_SSH_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          if [ -n "$SERVER_SSH_HOST_KEY" ]; then
            printf '%s\n' "$SERVER_SSH_HOST_KEY" > ~/.ssh/known_hosts
          else
            # Bootstrap fallback: pin whatever the server presents on first run.
            # Once SERVER_SSH_HOST_KEY is set in repo secrets this branch is skipped.
            ssh-keyscan -H -t ed25519,rsa 94.241.143.29 > ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to server (atomic swap)
        run: |
          sudo apt-get install -y -qq sshpass rsync >/dev/null 2>&1
          export SSHPASS='${{ secrets.SERVER_PASSWORD }}'
          OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o ConnectTimeout=30"
          sshpass -e ssh $OPTS root@94.241.143.29 "mkdir -p /var/www/salon-next && rm -rf /var/www/salon-next/*"
          sshpass -e rsync -az -e "ssh $OPTS" astro-site/dist/ root@94.241.143.29:/var/www/salon-next/
          sshpass -e scp $OPTS deploy/nginx.conf root@94.241.143.29:/etc/nginx/sites-available/salon
          sshpass -e ssh $OPTS root@94.241.143.29 '
            set -euo pipefail
            test -d /var/www/salon-next
            if [ -e /var/www/salon ] && [ -e /var/www/salon-old ]; then
              rm -rf /var/www/salon-old
            fi
            if [ -d /var/www/salon/files ]; then
              cp -al /var/www/salon/files /var/www/salon-next/files
            elif [ -d /var/www/salon-old/files ]; then
              cp -al /var/www/salon-old/files /var/www/salon-next/files
            fi
            if [ -f /var/www/salon/catalog.json ]; then
              cp -al /var/www/salon/catalog.json /var/www/salon-next/catalog.json
            elif [ -f /var/www/salon-old/catalog.json ]; then
              cp -al /var/www/salon-old/catalog.json /var/www/salon-next/catalog.json
            fi
            if [ -e /var/www/salon ]; then
              rm -rf /var/www/salon-old
              mv /var/www/salon /var/www/salon-old
            fi
            mv /var/www/salon-next /var/www/salon
            chown -R www-data:www-data /var/www/salon && chmod -R 755 /var/www/salon
            nginx -t && systemctl reload nginx
            rm -rf /var/www/salon-old
          '
          echo "Done"

      - name: Verify
        run: |
          sleep 5
          curl -fsS https://bibliosaloon.ru/ >/dev/null
          curl -fsS https://bibliosaloon.ru/catalog/ >/dev/null
          curl -fsS https://bibliosaloon.ru/me >/dev/null
