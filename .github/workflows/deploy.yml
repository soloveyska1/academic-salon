name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --- Desktop site (Vite) ---
      - name: Install desktop dependencies
        run: npm ci

      - name: Build desktop site
        run: npm run build

      # --- Expo mobile web app ---
      - name: Install Expo dependencies
        run: cd expo-app && npm ci

      - name: Build Expo web
        run: cd expo-app && npx expo export --platform web

      # --- Deploy desktop site ---
      - name: Deploy desktop to /var/www/salon
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 94.241.143.29
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          target: "/var/www/salon"
          strip_components: 1

      # --- Deploy Expo mobile web app ---
      - name: Deploy Expo to /var/www/salon/mobile
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 94.241.143.29
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "expo-app/dist/*"
          target: "/var/www/salon/mobile"
          strip_components: 2
          overwrite: true

      # --- Deploy nginx config and reload ---
      - name: Update nginx and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 94.241.143.29
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /var/www/salon/mobile
            cat > /etc/nginx/sites-available/salon << 'NGINX'
            server {
                server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
                root /var/www/salon;
                index index.html;
                charset utf-8;
                gzip on;
                gzip_vary on;
                gzip_min_length 1024;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
                location /api/doc-stats/ { proxy_pass http://127.0.0.1:8765; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 15s; }
                location /api/order { proxy_pass http://127.0.0.1:8765; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; client_max_body_size 1k; }
                location /api/admin/ { proxy_pass http://127.0.0.1:8765; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 30s; client_max_body_size 50m; }
                location /catalog.json { add_header Cache-Control "no-cache"; try_files $uri =404; }
                location /app/ { alias /var/www/salon/mobile/; try_files $uri $uri/ /app/index.html; }
                location / { try_files $uri $uri/ /index.html; }
                location /files/ { alias /var/www/salon/files/; add_header Content-Disposition "attachment"; }
                listen 443 ssl;
                ssl_certificate /etc/letsencrypt/live/bibliosaloon.ru/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/bibliosaloon.ru/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
            }
            server {
                if ($host = bibliosaloon.ru) { return 301 https://$host$request_uri; }
                listen 80;
                server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
                return 404;
            }
            NGINX
            nginx -t && systemctl reload nginx
