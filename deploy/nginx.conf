server {
    server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
    root /var/www/salon;
    index index.html;
    charset utf-8;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location /api/doc-stats/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }
    location /api/order {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }
    location /api/contribute {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }
    location /api/me/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    # Public calendar endpoint — read-only, no trailing slash (= matches
    # exact /api/calendar). The admin write-path lives under /api/admin/.
    location = /api/calendar {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }

    location /catalog.json { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location /sw.js { add_header Cache-Control "no-cache, must-revalidate"; }
    location /_assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
    # Old mobile app — redirect to main site
    location /app/ { return 301 /; }
    error_page 404 /404.html;
    location / { add_header Cache-Control "no-cache"; try_files $uri $uri/index.html $uri/ =404; }
    location /files/ { alias /var/www/salon/files/; add_header Content-Disposition "attachment"; }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bibliosaloon.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bibliosaloon.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = bibliosaloon.ru) { return 301 https://$host$request_uri; }
    listen 80;
    server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
    return 404;
}
