server {
    server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
    root /var/www/salon;
    index index.html;
    charset utf-8;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location /api/doc-stats/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }
    location /api/order {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }
    location /api/contribute {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }
    location /api/me/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    # Defensive redirects for mistaken social/inline buttons that point to the
    # May9 API namespace instead of the public project page. The real public
    # API is intentionally narrow: slots stays readable, voice stays writable.
    location = /api/may9 { return 302 /may9/; }
    location = /api/may9/ { return 302 /may9/; }
    location = /api/may9/slots {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }
    location = /api/may9/slots/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }
    location = /api/may9/voice {
        if ($request_method = GET) { return 302 /may9/; }
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }
    location = /api/may9/voice/ {
        if ($request_method = GET) { return 302 /may9/; }
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }
    location /api/may9/ {
        if ($request_method = GET) { return 302 /may9/; }
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }
    location /api/health/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }


    location = /api/smart-collections {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }
    location = /api/catalog-search/event {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }
    location /api/track/click {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }


    # Public calendar endpoint — read-only, no trailing slash (= matches
    # exact /api/calendar). The admin write-path lives under /api/admin/.
    location = /api/calendar {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 50m;
    }

    location /catalog.json { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location /sw.js { add_header Cache-Control "no-cache, must-revalidate"; }
    location /_assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
    # Per-doc OG cards — 1 day cache, social bots refetch periodically
    location /og/ { add_header Cache-Control "public, max-age=86400"; try_files $uri =404; }
    # RSS feed — application/rss+xml, 1 hour browser cache
    location = /feed.xml {
        default_type application/rss+xml;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
    # OpenSearch description — strict MIME for browser auto-discovery
    location = /opensearch.xml {
        default_type application/opensearchdescription+xml;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    # Old mobile app — redirect to main site
    location /app/ { return 301 /; }
    error_page 404 /404.html;
    location / { add_header Cache-Control "no-cache"; try_files $uri $uri/index.html $uri/ =404; }
    location /files/ { alias /var/www/salon/files/; add_header Content-Disposition "attachment"; }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bibliosaloon.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bibliosaloon.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Stage 52 — HSTS. Lighthouse mobile audit показал 2.5s wasted на
    # http→https редиректе (desktop 800ms). С HSTS браузер сам
    # апгрейдит URL без serverside roundtrip — экономим этот hop на
    # ВТОРОМ и далее визите. Первый визит всё ещё через 301.
    # max-age 1 год, includeSubDomains; preload оставлю на потом
    # (требует submit в HSTS-preload list, обратимо только через
    # 6 мес — не для мелкого изменения).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
server {
    if ($host = bibliosaloon.ru) { return 301 https://$host$request_uri; }
    listen 80;
    server_name bibliosaloon.ru www.bibliosaloon.ru 94.241.143.29;
    return 404;
}
