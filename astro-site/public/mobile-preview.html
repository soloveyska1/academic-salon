<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Preview — Academic Salon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0e0d10;
    color: #e8e4df;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Toolbar ─── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: #131215;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-wrap: wrap;
  }

  .toolbar-title {
    font-size: 14px;
    font-weight: 600;
    color: #d4af37;
    margin-right: auto;
    white-space: nowrap;
  }

  .device-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    background: transparent;
    color: #9b9590;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }

  .device-btn:hover {
    border-color: rgba(212,175,55,.3);
    color: #e8e4df;
  }

  .device-btn.active {
    border-color: #d4af37;
    color: #d4af37;
    background: rgba(212,175,55,.08);
  }

  .device-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  .device-dims {
    font-size: 11px;
    opacity: .6;
  }

  /* Page selector */
  .page-select {
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    background: #1a191c;
    color: #e8e4df;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }

  .page-select:focus {
    border-color: rgba(212,175,55,.4);
  }

  .page-select option {
    background: #1a191c;
  }

  /* Orientation toggle */
  .orient-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    background: transparent;
    color: #9b9590;
    cursor: pointer;
    transition: all .15s ease;
  }

  .orient-btn:hover {
    border-color: rgba(212,175,55,.3);
    color: #e8e4df;
  }

  .orient-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
    transition: transform .3s ease;
  }

  .orient-btn.landscape svg {
    transform: rotate(90deg);
  }

  /* ─── Preview area ─── */
  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: auto;
  }

  /* ─── Phone frame ─── */
  .phone-frame {
    position: relative;
    background: #1c1b1e;
    border-radius: 40px;
    padding: 12px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08),
      0 20px 60px rgba(0,0,0,.5),
      inset 0 0 0 1px rgba(255,255,255,.03);
    transition: width .4s cubic-bezier(.4,0,.2,1),
                height .4s cubic-bezier(.4,0,.2,1);
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    background: #2a292c;
    border-radius: 4px;
    z-index: 2;
  }

  /* Notch for iPhone-style devices */
  .phone-frame.has-notch::before {
    width: 120px;
    height: 28px;
    top: 12px;
    background: #1c1b1e;
    border-radius: 0 0 16px 16px;
  }

  .phone-inner {
    width: 100%;
    height: 100%;
    border-radius: 28px;
    overflow: hidden;
    background: #09080a;
  }

  .phone-inner iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #09080a;
  }

  /* ─── Device sizes ─── */
  .phone-frame[data-device="iphone-se"] {
    width: calc(375px + 24px);
    height: calc(667px + 24px);
  }

  .phone-frame[data-device="iphone-14"] {
    width: calc(390px + 24px);
    height: calc(844px + 24px);
  }

  .phone-frame[data-device="iphone-15-pro-max"] {
    width: calc(430px + 24px);
    height: calc(932px + 24px);
  }

  .phone-frame[data-device="pixel-7"] {
    width: calc(412px + 24px);
    height: calc(915px + 24px);
  }

  .phone-frame[data-device="galaxy-s24"] {
    width: calc(360px + 24px);
    height: calc(780px + 24px);
  }

  .phone-frame[data-device="ipad-mini"] {
    width: calc(768px + 24px);
    height: calc(1024px + 24px);
    border-radius: 24px;
  }

  .phone-frame[data-device="ipad-mini"] .phone-inner {
    border-radius: 12px;
  }

  /* Landscape mode */
  .phone-frame.landscape[data-device="iphone-se"] {
    width: calc(667px + 24px);
    height: calc(375px + 24px);
  }

  .phone-frame.landscape[data-device="iphone-14"] {
    width: calc(844px + 24px);
    height: calc(390px + 24px);
  }

  .phone-frame.landscape[data-device="iphone-15-pro-max"] {
    width: calc(932px + 24px);
    height: calc(430px + 24px);
  }

  .phone-frame.landscape[data-device="pixel-7"] {
    width: calc(915px + 24px);
    height: calc(412px + 24px);
  }

  .phone-frame.landscape[data-device="galaxy-s24"] {
    width: calc(780px + 24px);
    height: calc(360px + 24px);
  }

  .phone-frame.landscape[data-device="ipad-mini"] {
    width: calc(1024px + 24px);
    height: calc(768px + 24px);
  }

  /* ─── Status bar ─── */
  .status-info {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    padding: 8px 16px;
    background: rgba(19,18,21,.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 10px;
    font-size: 12px;
    color: #656060;
  }

  .status-info span {
    color: #9b9590;
  }

  /* ─── Scale for small screens ─── */
  @media (max-height: 900px) {
    .preview-area { padding: 12px; }
    .phone-frame { transform: scale(0.75); transform-origin: center center; }
  }

  @media (max-width: 500px) {
    .phone-frame { transform: scale(0.5); transform-origin: center center; }
    .toolbar { gap: 6px; padding: 8px 12px; }
    .device-btn { padding: 4px 8px; font-size: 11px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">Mobile Preview</div>

  <select class="page-select" id="pageSelect">
    <option value="/">/ Главная</option>
    <option value="/catalog">/catalog Каталог</option>
    <option value="/order">/order Заказать</option>
    <option value="/about">/about О нас</option>
    <option value="/contribute">/contribute Поделиться</option>
  </select>

  <button class="device-btn active" data-device="iphone-14" data-w="390" data-h="844">
    <svg viewBox="0 0 24 24"><path d="M15.5 1h-8A2.5 2.5 0 0 0 5 3.5v17A2.5 2.5 0 0 0 7.5 23h8a2.5 2.5 0 0 0 2.5-2.5v-17A2.5 2.5 0 0 0 15.5 1zm-4 21a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5-3H7V4h9.5v15z"/></svg>
    iPhone 14 <span class="device-dims">390×844</span>
  </button>

  <button class="device-btn" data-device="iphone-se" data-w="375" data-h="667">
    <svg viewBox="0 0 24 24"><path d="M15.5 1h-8A2.5 2.5 0 0 0 5 3.5v17A2.5 2.5 0 0 0 7.5 23h8a2.5 2.5 0 0 0 2.5-2.5v-17A2.5 2.5 0 0 0 15.5 1zm-4 21a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5-3H7V4h9.5v15z"/></svg>
    iPhone SE <span class="device-dims">375×667</span>
  </button>

  <button class="device-btn" data-device="iphone-15-pro-max" data-w="430" data-h="932">
    <svg viewBox="0 0 24 24"><path d="M15.5 1h-8A2.5 2.5 0 0 0 5 3.5v17A2.5 2.5 0 0 0 7.5 23h8a2.5 2.5 0 0 0 2.5-2.5v-17A2.5 2.5 0 0 0 15.5 1zm-4 21a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5-3H7V4h9.5v15z"/></svg>
    iPhone 15 Pro Max <span class="device-dims">430×932</span>
  </button>

  <button class="device-btn" data-device="pixel-7" data-w="412" data-h="915">
    <svg viewBox="0 0 24 24"><path d="M15.5 1h-8A2.5 2.5 0 0 0 5 3.5v17A2.5 2.5 0 0 0 7.5 23h8a2.5 2.5 0 0 0 2.5-2.5v-17A2.5 2.5 0 0 0 15.5 1zm-4 21a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5-3H7V4h9.5v15z"/></svg>
    Pixel 7 <span class="device-dims">412×915</span>
  </button>

  <button class="device-btn" data-device="galaxy-s24" data-w="360" data-h="780">
    <svg viewBox="0 0 24 24"><path d="M15.5 1h-8A2.5 2.5 0 0 0 5 3.5v17A2.5 2.5 0 0 0 7.5 23h8a2.5 2.5 0 0 0 2.5-2.5v-17A2.5 2.5 0 0 0 15.5 1zm-4 21a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5-3H7V4h9.5v15z"/></svg>
    Galaxy S24 <span class="device-dims">360×780</span>
  </button>

  <button class="device-btn" data-device="ipad-mini" data-w="768" data-h="1024">
    <svg viewBox="0 0 24 24"><path d="M19 1H5a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm-7 22a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm7-4H5V4h14v15z"/></svg>
    iPad mini <span class="device-dims">768×1024</span>
  </button>

  <button class="orient-btn" id="orientBtn" title="Toggle orientation">
    <svg viewBox="0 0 24 24"><path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zm-6.25.77l-.02.02a8.527 8.527 0 0 0-2.72 2.21L2 0v9h9L6.86 4.86a6.547 6.547 0 0 1 2.13-1.73l1.24-1.84zM7.52 21.48C4.25 19.94 1.91 16.76 1.55 13H.05C.56 19.16 5.71 24 12 24l.66-.03-3.81-3.81-1.33 1.32zM20 15h-9l4.14 4.14a6.557 6.557 0 0 1-2.13 1.73l-1.25 1.84.02-.02a8.527 8.527 0 0 0 2.72-2.21L20 24v-9z"/></svg>
  </button>
</div>

<div class="preview-area">
  <div class="phone-frame has-notch" id="phoneFrame" data-device="iphone-14">
    <div class="phone-inner">
      <iframe id="previewFrame" src="/"></iframe>
    </div>
  </div>
</div>

<div class="status-info">
  <div>Device: <span id="statusDevice">iPhone 14</span></div>
  <div>Viewport: <span id="statusSize">390 × 844</span></div>
  <div>Page: <span id="statusPage">/</span></div>
</div>

<script>
  const frame = document.getElementById('phoneFrame');
  const iframe = document.getElementById('previewFrame');
  const orientBtn = document.getElementById('orientBtn');
  const pageSelect = document.getElementById('pageSelect');
  const deviceBtns = document.querySelectorAll('.device-btn');
  const statusDevice = document.getElementById('statusDevice');
  const statusSize = document.getElementById('statusSize');
  const statusPage = document.getElementById('statusPage');

  let isLandscape = false;
  let currentW = 390;
  let currentH = 844;

  // Device switching
  deviceBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      deviceBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const device = btn.dataset.device;
      currentW = parseInt(btn.dataset.w);
      currentH = parseInt(btn.dataset.h);

      frame.dataset.device = device;

      // Notch for modern iPhones
      if (device.includes('iphone-14') || device.includes('iphone-15')) {
        frame.classList.add('has-notch');
      } else {
        frame.classList.remove('has-notch');
      }

      updateStatus(btn.textContent.trim().split('\n')[0].trim());
    });
  });

  // Orientation toggle
  orientBtn.addEventListener('click', () => {
    isLandscape = !isLandscape;
    orientBtn.classList.toggle('landscape', isLandscape);
    frame.classList.toggle('landscape', isLandscape);
    updateStatus();
  });

  // Page switching
  pageSelect.addEventListener('change', () => {
    iframe.src = pageSelect.value;
    statusPage.textContent = pageSelect.value;
  });

  function updateStatus(deviceName) {
    if (deviceName) {
      // Clean up the device name
      const clean = deviceName.replace(/\d+×\d+/, '').trim();
      statusDevice.textContent = clean;
    }
    const w = isLandscape ? currentH : currentW;
    const h = isLandscape ? currentW : currentH;
    statusSize.textContent = `${w} × ${h}`;
  }
</script>

</body>
</html>
