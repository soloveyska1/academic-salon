<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0d14"/>
      <stop offset="1" stop-color="#09080c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#916a12"/>
      <stop offset=".3" stop-color="#d4af37"/>
      <stop offset=".5" stop-color="#f6e27a"/>
      <stop offset=".7" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#916a12"/>
    </linearGradient>
    <linearGradient id="gold-subtle" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0" stop-color="#f6e27a" stop-opacity=".12"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="border-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4af37" stop-opacity=".2"/>
      <stop offset=".5" stop-color="#f6e27a" stop-opacity=".1"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity=".2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect x="1" y="1" width="190" height="190" rx="41" fill="none" stroke="url(#border-gold)" stroke-width="1.5"/>

  <!-- Top edge highlight -->
  <rect x="40" y="0" width="112" height="2" rx="1" fill="url(#gold)" opacity=".2"/>

  <!-- Inner glow -->
  <ellipse cx="96" cy="60" rx="60" ry="40" fill="url(#gold-subtle)"/>

  <!-- Diamond ornament top -->
  <g opacity=".3">
    <line x1="56" y1="48" x2="84" y2="48" stroke="url(#gold)" stroke-width="1"/>
    <text x="96" y="52" text-anchor="middle" font-size="8" fill="#d4af37">&#9830;</text>
    <line x1="108" y1="48" x2="136" y2="48" stroke="url(#gold)" stroke-width="1"/>
  </g>

  <!-- АС monogram -->
  <text x="96" y="128" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="82" font-weight="900" letter-spacing="-2" fill="url(#gold)">АС</text>

  <!-- Subtitle -->
  <text x="96" y="155" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="#d4af37" opacity=".4">САЛОН</text>

  <!-- Diamond ornament bottom -->
  <g opacity=".25">
    <line x1="56" y1="168" x2="84" y2="168" stroke="url(#gold)" stroke-width="1"/>
    <text x="96" y="172" text-anchor="middle" font-size="8" fill="#d4af37">&#9830;</text>
    <line x1="108" y1="168" x2="136" y2="168" stroke="url(#gold)" stroke-width="1"/>
  </g>
</svg>
