<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6e27a"/>
      <stop offset=".35" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#916a12"/>
    </linearGradient>
    <linearGradient id="gold-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e27a" stop-opacity=".06"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".35" r=".4">
      <stop offset="0" stop-color="#d4af37" stop-opacity=".06"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#09080c"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Top edge highlight -->
  <rect x="160" y="1" width="192" height="1.5" rx=".75" fill="url(#gold)" opacity=".12"/>

  <!-- Unified АС glyph — centered, bold, geometric -->
  <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round" transform="translate(256,260)">
    <!-- А: left leg -->
    <line x1="-100" y1="125" x2="-10" y2="-138" stroke-width="18"/>
    <!-- А: right leg (shared spine) -->
    <line x1="52" y1="125" x2="-10" y2="-138" stroke-width="18"/>
    <!-- А: crossbar — elegant, slightly thinner -->
    <line x1="-68" y1="46" x2="36" y2="46" stroke-width="12"/>
    <!-- С: open arc, positioned to share visual weight with А -->
    <path d="M138 -72 C112 -130, 62 -142, 40 -96" stroke-width="18"/>
    <path d="M40 96 C62 142, 112 130, 138 72" stroke-width="18"/>
  </g>

  <!-- Subtle bottom accent -->
  <rect x="200" y="510" width="112" height="1.5" rx=".75" fill="url(#gold)" opacity=".06"/>
</svg>
