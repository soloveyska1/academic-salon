<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e27a"/>
      <stop offset=".4" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#916a12"/>
    </linearGradient>
    <linearGradient id="gold-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#916a12"/>
      <stop offset=".5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#916a12"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4af37" stop-opacity=".2"/>
      <stop offset=".5" stop-color="#f6e27a" stop-opacity=".08"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity=".2"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".4" r=".4">
      <stop offset="0" stop-color="#d4af37" stop-opacity=".06"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#09080c"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Outer decorative rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#ring)" stroke-width="2"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#ring)" stroke-width=".8"/>

  <!-- Open book shape -->
  <path d="M256 130 L100 170 L100 370 L256 330 L412 370 L412 170 Z"
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linejoin="round" opacity=".15"/>
  <!-- Spine -->
  <line x1="256" y1="130" x2="256" y2="330" stroke="url(#gold)" stroke-width="1" opacity=".1"/>
  <!-- Page lines left -->
  <line x1="125" y1="205" x2="238" y2="190" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>
  <line x1="125" y1="230" x2="238" y2="215" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>
  <line x1="125" y1="255" x2="238" y2="240" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>
  <line x1="125" y1="280" x2="238" y2="265" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>
  <!-- Page lines right -->
  <line x1="387" y1="205" x2="274" y2="190" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>
  <line x1="387" y1="230" x2="274" y2="215" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>
  <line x1="387" y1="255" x2="274" y2="240" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>
  <line x1="387" y1="280" x2="274" y2="265" stroke="url(#gold)" stroke-width=".6" opacity=".06"/>

  <!-- Top ornament -->
  <line x1="150" y1="95" x2="230" y2="95" stroke="url(#gold-h)" stroke-width="1" opacity=".25"/>
  <text x="256" y="100" text-anchor="middle" font-size="12" fill="#d4af37" opacity=".25">&#9830;</text>
  <line x1="282" y1="95" x2="362" y2="95" stroke="url(#gold-h)" stroke-width="1" opacity=".25"/>

  <!-- АС monogram -->
  <text x="256" y="310" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="195" font-weight="900" fill="url(#gold)" opacity=".92">АС</text>

  <!-- Subtitle -->
  <text x="256" y="385" text-anchor="middle" font-family="'Inter',sans-serif" font-size="22" font-weight="600" letter-spacing="8" fill="#d4af37" opacity=".25">САЛОН</text>

  <!-- Bottom ornament -->
  <line x1="150" y1="425" x2="230" y2="425" stroke="url(#gold-h)" stroke-width="1" opacity=".18"/>
  <text x="256" y="430" text-anchor="middle" font-size="12" fill="#d4af37" opacity=".18">&#9830;</text>
  <line x1="282" y1="425" x2="362" y2="425" stroke="url(#gold-h)" stroke-width="1" opacity=".18"/>
</svg>
