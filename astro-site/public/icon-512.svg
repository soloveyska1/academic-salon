<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0d14"/>
      <stop offset="1" stop-color="#09080c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#916a12"/>
      <stop offset=".3" stop-color="#d4af37"/>
      <stop offset=".5" stop-color="#f6e27a"/>
      <stop offset=".7" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#916a12"/>
    </linearGradient>
    <linearGradient id="gold-subtle" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0" stop-color="#f6e27a" stop-opacity=".1"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="border-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4af37" stop-opacity=".18"/>
      <stop offset=".5" stop-color="#f6e27a" stop-opacity=".08"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity=".18"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="110.5" fill="none" stroke="url(#border-gold)" stroke-width="2"/>

  <!-- Top edge highlight -->
  <rect x="120" y="0" width="272" height="2.5" rx="1.25" fill="url(#gold)" opacity=".18"/>

  <!-- Inner glow -->
  <ellipse cx="256" cy="160" rx="160" ry="100" fill="url(#gold-subtle)"/>

  <!-- Diamond ornament top -->
  <g opacity=".3">
    <line x1="140" y1="125" x2="225" y2="125" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="256" y="130" text-anchor="middle" font-size="14" fill="#d4af37">&#9830;</text>
    <line x1="287" y1="125" x2="372" y2="125" stroke="url(#gold)" stroke-width="1.5"/>
  </g>

  <!-- АС monogram -->
  <text x="256" y="340" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="220" font-weight="900" letter-spacing="-6" fill="url(#gold)">АС</text>

  <!-- Subtitle -->
  <text x="256" y="405" text-anchor="middle" font-family="'Inter',sans-serif" font-size="28" font-weight="600" letter-spacing="10" fill="#d4af37" opacity=".35">САЛОН</text>

  <!-- Diamond ornament bottom -->
  <g opacity=".22">
    <line x1="140" y1="445" x2="225" y2="445" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="256" y="450" text-anchor="middle" font-size="14" fill="#d4af37">&#9830;</text>
    <line x1="287" y1="445" x2="372" y2="445" stroke="url(#gold)" stroke-width="1.5"/>
  </g>
</svg>
