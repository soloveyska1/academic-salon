<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Нет соединения — Библиотека академического салона</title>
  <meta name="theme-color" content="#d4af37" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      background:
        radial-gradient(circle at 20% 20%, rgba(212,175,55,.12), transparent 28%),
        radial-gradient(circle at 80% 78%, rgba(212,175,55,.08), transparent 30%),
        #09080a;
      color: #f0ede8;
      font-family: Inter, system-ui, sans-serif;
    }
    .card {
      width: min(100%, 460px);
      padding: 28px;
      border: 1px solid rgba(212,175,55,.16);
      border-radius: 28px;
      background: linear-gradient(160deg, rgba(22,20,26,.985), rgba(12,11,15,.96));
      box-shadow: 0 28px 90px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .seal {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      border: 1px solid rgba(212,175,55,.2);
      color: #f6e27a;
      font: 600 12px/1 "JetBrains Mono", monospace;
      letter-spacing: .22em;
      text-indent: .22em;
      background: radial-gradient(circle at 50% 30%, rgba(246,226,122,.16), rgba(212,175,55,.08) 48%, rgba(255,255,255,.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 14px 30px rgba(212,175,55,.08);
    }
    .eyebrow {
      margin-top: 18px;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #9b9590;
    }
    h1 {
      margin: 14px 0 0;
      font: 400 clamp(34px, 8vw, 46px)/1.02 "Cormorant Garamond", Georgia, serif;
      letter-spacing: .02em;
    }
    p {
      margin: 14px 0 0;
      color: #c8c3bc;
      font-size: 15px;
      line-height: 1.7;
    }
    .actions {
      margin-top: 24px;
      display: grid;
      gap: 10px;
    }
    a, button {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 1px solid rgba(212,175,55,.16);
      text-decoration: none;
      color: #f0ede8;
      background: rgba(255,255,255,.03);
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      cursor: pointer;
    }
    button {
      font-family: inherit;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="seal" aria-hidden="true">АС</div>
    <div class="eyebrow">Офлайн-режим</div>
    <h1>Соединение пропало</h1>
    <p>Последние открытые разделы останутся доступны из кеша. Когда сеть вернётся, библиотека обновится автоматически.</p>
    <div class="actions">
      <button type="button" onclick="location.reload()">Попробовать снова</button>
      <a href="/catalog">Открыть каталог</a>
    </div>
  </main>
</body>
</html>
